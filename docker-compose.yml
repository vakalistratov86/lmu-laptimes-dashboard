services:
  db:
    image: postgres:16-alpine
    container_name: lmu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lmu_dashboard
      POSTGRES_USER: lmu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmu -d lmu_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    image: ghcr.io/vakalistratov86/lmu-laptimes-dashboard:latest
    container_name: lmu-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://lmu:${POSTGRES_PASSWORD}@db:5432/lmu_dashboard
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
